<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízes do Nordeste</title>
    <link rel="stylesheet" href="raizes.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
</head>
<body>

    <header class="menu-container">
        <div class="logo">
            <img src="imagens/raizes-do-nordeste.png" alt="logo-restaurante">
        </div>
        <nav class="header-nav">
            <span class="material-symbols-outlined">menu</span>
        </nav>
    </header>

     <h2 class="tittulo-section">Nosso Cardápio </h2>

    <section class="cardapio">
        <article class="opcoes">
            <div>
                <img src="imagens/opcao-1.png" alt="moqueca-nordestina">
            </div>

            <div>
                <p>Moqueca Nordestina</p>
                <p>R$ 190</p>
            </div>

            <button>Adicionar</button>
        </article>

        <article class="opcoes">
            <div>
                <img src="imagens/opcao-2.png" alt="baião-de-dois-com-camarão">
            </div>

            <div>
                <p>Baião de 2 com Camarão</p>
                <p>R$ 160</p>
            </div>

            <button>Adicionar</button>

        </article>

        <article class="opcoes">
            <div>
                <img src="imagens/opcao-3.png" alt="carne-de-sol-com-purê-de-macaxeira">
            </div>

            <div>
                <p>Carne de Sol com Purê de Macaxeira</p>
                <p>R$ 145</p>
            </div>

            <button>Adicionar</button>
        </article>
    </section>

    <h2 class="titulo-section">Destaques da Casa</h2>

    <section>
        <article>
            <div>
                <img src="imagens/destaque-1.png" alt="carne-seca-com-queijo-gratinado">
                <p>Carne Seca com Queijo Gratinado</p>
                <p>R$ 135</p>
                <button>Adicionar</button>
            </div>

            <div>
                <img src="imagens/destaque-2.png" alt="camarão-na-moranga-nordestina">
                <p>Camarão na Moranga Nordestina</p>
                <p>R$ 155</p>
                <button>Adicionar</button>
            </div>

            <div>
                <img src="imagens/destaque-3.png" alt="peixe-frito-com-pirão-evinagrete">
                <p>Peixe Frito com Pirão e Vinagrete</p>
                <p>R$ 130</p>
                <button>Adicionar</button>
            </div>
        </article>
    </section>

    
    
</body>
</html>
