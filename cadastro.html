<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="cadastro-media.css">

</head>

<body>

    <form action="#" method="post">
        <fieldset>
            <legend>Informe seus dados para cadastro</legend>
            
            <label for="user">Nome</label>
            <input type="text" id="nome" placeholder="Nome" required autofocus>

            <label for="user">Sobrenome</label>
            <input type="text" id="sobrenome" placeholder="Sobrenome" required >

            <label for="user">CPF</label>
            <input type="number" id="user" placeholder="CPF" required autofocus>

            <label for="user">Data de Nascimento</label>
            <input type="date" id="user" required autofocus>

            <label for="user">Endereço</label>
            <input type="text" id="user" placeholder="Endereço completo" required autofocus>

            <label for="user">Email</label>
            <input type="email" id="user" placeholder="Ex: exemplo@email.com" required autofocus>

            <label for="pass">Senha</label>
            <input type="password" id="pass" placeholder="Informe uma senha" required>

        </fieldset>
    </form>

    <input type="submit" value="Cadastrar" class="btn">


    <script src="cadastro.js"></script>

    
</body>
</html>
