<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="login-media.css">
</head>
<body>
    
    <form action="#" method="post">
        <fieldset>
            <legend>Entre com seus dados de acesso</legend>
            
            <label for="user">Usuário</label>
            <input type="text" id="user" placeholder="exemplo@email.com" required autofocus>

            <label for="pass">Senha</label>
            <input type="password" id="pass" placeholder="Informe sua senha" required>
        </fieldset>
    </form>

    <input type="submit" value="Entrar" class="btn">
    <p class="cadastro-paragrafo">Não possui cadastro?</p> 
    <a href="cadastro.html" class="link-cliqueAqui" target="_blank">Clique aqui!</a>
</body>
</html>
