<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="pagamento.css">
    <link rel="stylesheet" href="pagamento-media.css">
    

</head>

<body>

    <form action="#" method="post">
        <fieldset>
            <legend>Informe os dados para pagamento</legend>
            
            <label for="user">Nome</label>
            <input type="text" id="nome" placeholder="Como consta no cartão" required autofocus>

            <label for="user">CPF</label>
            <input type="number" id="user" placeholder="CPF do titular do cartão" required autofocus>

            <label for="user">Número do cartão</label>
            <input type="number" id="user" required autofocus>

            <label for="user">Data de validade do cartão (MM/AA)</label>
            <input type="month" id="user" required autofocus>

            <label for="user">Código de segurança</label>
            <input type="text" id="user" placeholder="Exemplo: 123" required autofocus>

        </fieldset>
    </form>

    <input type="submit" value="Efetuar Pagamento" class="btn">
  
</body>
</html>
